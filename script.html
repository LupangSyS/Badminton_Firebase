<script>
  // --- Persistence & State Management ---
const STORAGE_KEY = 'BADMINTON_MANAGER_V7_DATA';


// ฟังก์ชันเช็คว่ามี Modal เปิดอยู่ไหม (เพื่อป้องกัน UI Freeze)
function isModalOpen() {
    const booking = document.getElementById('booking-modal');
    const winner = document.getElementById('winner-modal');
    return (booking && booking.style.display === 'flex') || (winner && winner.style.display === 'flex');
}


// บันทึกข้อมูลลงเครื่อง
function saveData() {
    const data = {
        players,
        courts: courts.map(c => ({...c, interval: null})), // ไม่บันทึก interval object
        courtCount,
        pairingHistory,
        opponentHistory,
        matchLogs,
        bookingCounter,
        gameRule: document.getElementById('game-rule').value,
        rankedMode: isRankedMode // ✨ บันทึกค่านี้
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}


// โหลดข้อมูลกลับมา
function loadData() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;


    try {
        const data = JSON.parse(raw);
        players = data.players || [];
        courtCount = data.courtCount || 2;
        pairingHistory = data.pairingHistory || {};
        opponentHistory = data.opponentHistory || {};
        matchLogs = data.matchLogs || [];
        bookingCounter = data.bookingCounter || 0;
       
       // ✨ Restore Ranked Mode
        if (typeof data.rankedMode !== 'undefined') {
            isRankedMode = data.rankedMode;
            const cb = document.getElementById('ranked-mode-toggle');
            if (cb) cb.checked = isRankedMode;
        }

        return true;

        // Restore Courts
        if (data.courts) {
            courts = data.courts.map((c, index) => { // ✨ เพิ่ม index
                c.interval = null;
               
                // ⏰ ปลุกนาฬิกา: ถ้าสถานะคือ "เล่นอยู่" ให้สั่งเดินเวลาต่อทันที!
                if (c.state === 'playing') {
                    c.interval = setInterval(() => {
                        c.timer++;
                        const el = document.getElementById(`timer-${index}`);
                        if(el) el.innerText = formatTime(c.timer);
                    }, 1000);
                }
                return c;
            });
        }
       
        // Restore Rule
        if (data.gameRule) {
            const ruleSelect = document.getElementById('game-rule');
            if(ruleSelect) ruleSelect.value = data.gameRule;
        }


        return true;
    } catch (e) {
        console.error("Load Data Error:", e);
        return false;
    }
}
  // ✨ NEW: ฟังก์ชันช่วยนับจำนวนคนจริงๆ (ไม่นับช่องว่าง)
const countRealPlayers = (court) => {
    return court.players.filter(p => p !== null && p !== undefined).length;
};
// --- ⚖️ LEVEL & BALANCING SYSTEM (Senior Dev Wave's Logic) ---
const LEVEL_WEIGHTS = { 'BG': 1, 'N': 2, 'S': 3, 'P': 4 };
const LEVEL_COLORS = {
    'BG': '#bdbdbd', // เทา (Beginner)
    'N': '#66bb6a',  // เขียว (Normal)
    'S': '#ffa726',  // ส้ม (Semi-Pro)
    'P': '#ef5350'   // แดง (Pro)
};


// ฟังก์ชันสลับเลเวล (วนลูป BG -> N -> S -> P -> BG)
const toggleLevel = (id) => {
    const p = players.find(x => x.id === id);
    if (!p) return;
   
    const levels = ['BG', 'N', 'S', 'P']; // เรียงลำดับยศ
    const currentIdx = levels.indexOf(p.level || 'BG');
    p.level = levels[(currentIdx + 1) % levels.length]; // วนลูป
   
    updateQueueDisplay(); // อัปเดตหน้าจอทันที
};


// ==========================================
// ⚖️ GOD TIER BALANCING SYSTEM (V.Final)
// ==========================================

const RANK_SCORES = { 'P': 4, 'S': 3, 'N': 2, 'BG': 1 };

// Helper: คำนวณพลังผู้เล่น (Rank + Anti-Streak Weight)
function getPlayerPower(p) {
    const baseScore = RANK_SCORES[p.level || 'BG'] || 1;
    
    // 🔥 Rule 4: Anti-Streak (The Challenger)
    // ถ้าชนะติดกัน 3 ตาขึ้นไป ให้บวกน้ำหนักเทียม +0.5
    // ผลลัพธ์: ระบบจะมองว่าคนนี้เก่งเวอร์ ทำให้ต้องไปจับคู่กับคนที่อ่อนลง 
    // หรือไปอยู่ฝั่งที่ต้องแบกทีมหนักขึ้น เพื่อให้สมการ Balance เป็น 0
    const streakPenalty = (p.winStreak >= 3) ? 0.5 : 0;
    
    return baseScore + streakPenalty;
}

// Helper: คำนวณ Win Rate (0.0 - 1.0)
function getWinRate(p) {
    return p.gamesPlayed > 0 ? (p.wins / p.gamesPlayed) : 0;
}

// ฟังก์ชันจัดทีมขั้นเทพ
const autoBalanceTeam = (candidates) => {
    // กฎเหล็ก: ถ้ามีคนจอง (Booking) ต้องเคารพการจัดทีมของเขา
    if (candidates.some(p => p.bookingId) || candidates.length !== 4) {
        return candidates;
    }

    // ความเป็นไปได้ในการจับคู่ (3 รูปแบบ)
    // Combo 1: [0,1] vs [2,3]
    // Combo 2: [0,2] vs [1,3]
    // Combo 3: [0,3] vs [1,2]
    const combinations = [
        [0, 1, 2, 3], 
        [0, 2, 1, 3], 
        [0, 3, 1, 2]  
    ];

    let bestCombo = combinations[0];
    let minDiffScore = Infinity; // เก็บค่าความต่างที่น้อยที่สุด

    combinations.forEach(combo => {
        const p1 = candidates[combo[0]];
        const p2 = candidates[combo[1]];
        const p3 = candidates[combo[2]];
        const p4 = candidates[combo[3]];

        // --- 1. ตรวจสอบเงื่อนไขห้าม (Constraints) ---
        
        // เช็คความห่างชั้นของคู่หู (Gap > 2)
        // P(4) คู่ BG(1) = ต่าง 3 -> ห้าม!
        const score1 = RANK_SCORES[p1.level||'BG'];
        const score2 = RANK_SCORES[p2.level||'BG'];
        const score3 = RANK_SCORES[p3.level||'BG'];
        const score4 = RANK_SCORES[p4.level||'BG'];


        // --- 2. คำนวณความสมดุล (Primary Goal: Power Balance) ---
        
        const team1Power = getPlayerPower(p1) + getPlayerPower(p2);
        const team2Power = getPlayerPower(p3) + getPlayerPower(p4);
        
        // ความต่างของพลังทีม (ยิ่งน้อยยิ่งดี)
        // คูณ 1000 เพื่อให้มีน้ำหนักมากกว่า Win Rate
        const powerDiff = Math.abs(team1Power - team2Power) * 1000; 

        // --- 3. คำนวณฟอร์มการเล่น (Secondary Goal: Win Rate Equalizer) ---
        
        const team1WinRate = getWinRate(p1) + getWinRate(p2);
        const team2WinRate = getWinRate(p3) + getWinRate(p4);
        
        // ความต่างของ Win Rate (ใช้เป็น Tie-breaker)
        const winRateDiff = Math.abs(team1WinRate - team2WinRate);

        // --- 4. กฎเพิ่มเติม (Optional) ---
        // ปรับโทษถ้าเจอคู่ซ้ำ (Partner Repeat) เพื่อกระจายคน
        let repeatPenalty = 0;
        if (getPairCount(p1.id, p2.id) > 0) repeatPenalty += 500;
        if (getPairCount(p3.id, p4.id) > 0) repeatPenalty += 500;

        // คะแนนรวมความแย่ (ยิ่งน้อยยิ่งดี)
        // Score = (พลังต่างกัน * 1000) + (โทษคู่ซ้ำ) + (WinRate ต่างกัน)
        const totalBadness = powerDiff + repeatPenalty + winRateDiff;

        if (totalBadness < minDiffScore) {
            minDiffScore = totalBadness;
            bestCombo = combo;
        }
    });

    // ส่งคืนทีมที่จัดแล้วตาม Combo ที่ดีที่สุด
    return [
        candidates[bestCombo[0]], 
        candidates[bestCombo[1]], 
        candidates[bestCombo[2]], 
        candidates[bestCombo[3]]
    ];
};




// ✨ NEW: ฟังก์ชันยัดคนลงช่องว่างแรกที่เจอ (แทนการ push)
const addPlayerToCourt = (court, player) => {
    // หาช่องที่เป็น null หรือ undefined ก่อน
    let emptyIdx = court.players.findIndex(p => p === null || p === undefined);
   
    if (emptyIdx !== -1) {
        // ถ้าเจอหลุม ให้เสียบลงหลุม
        court.players[emptyIdx] = player;
    } else {
        // ถ้าไม่เจอหลุม (และยังไม่เต็ม 4) ให้ต่อท้ายปกติ
        if (court.players.length < 4) {
            court.players.push(player);
        } else {
            console.error("สนามเต็มแล้ว ยัดไม่เข้า!");
        }
    }
};


// --- Data ---
let players = [];
let courts = [];  
let courtCount = 2;
let bookingCounter = 0;
let activeGameResolveCourtId = null;
let pairingHistory = {};
let opponentHistory = {}; // ✨ NEW: ตัวแปรจำหน้าศัตรู
let matchLogs = [];
let isRankedMode = false; // ✨ NEW: ตัวแปรเก็บสถานะ Ranked Mode

// --- Configuration (Frozen Logic V4.0) ---
const AVG_GAME_DURATION = 15;
const AUTO_START_DELAY = 30;


// --- Init ---
function init() {
    renderCourts();
    updateQueueDisplay(); // ในนี้มี updateNextMatchPanel แล้ว ก็จบเลย

    updateCustomHoursInputs();
    // พยายามโหลดข้อมูลเก่าก่อน
    if (loadData()) {
        console.log("📂 Loaded data from LocalStorage");
        // ถ้ามีข้อมูลคอร์ทที่เล่นค้างอยู่ ต้องสั่งเดินเวลาต่อ (แบบคร่าวๆ) หรือ Reset Timer ก็ได้
        // ในที่นี้จะ Render เลย
    }


    renderCourts();
    updateQueueDisplay();
   
    // Auto Save Loop (กันเหนียวทุก 5 วิ)
    setInterval(saveData, 5000);


    // Auto Refresh Logic
    setInterval(() => {
        // ✨ FIX UI FREEZE: ถ้าเปิด Modal อยู่ ห้าม Auto Fill/Render
        if (!isModalOpen()) {
            autoFillCourts();
        }
    }, 1000);

// เพิ่มตัวนี้ลงไป เพื่อคอยอัปเดตเวลาทุกคอร์ทโดยคำนวณจาก StartTime
    setInterval(() => {
        courts.forEach((c, idx) => {
            if (c.state === 'playing' && c.gameStartTime) {
                // คำนวณเวลาจริง: (ปัจจุบัน - เวลาเริ่ม) / 1000
                const diffSec = Math.floor((Date.now() - c.gameStartTime) / 1000);
                c.timer = diffSec; // อัปเดตค่าในตัวแปร
                
                // อัปเดตหน้าจอ
                const el = document.getElementById(`timer-${idx}`);
                if (el) el.innerText = formatTime(diffSec);
            }
        });
    }, 1000);

    setInterval(() => {
        if (!isModalOpen()) {
            updateQueueDisplay();
        }
    }, 60000);
   
    updateCustomHoursInputs();
}

}

// --- LOGIC: MATCHMAKING ---
function getPairKey(id1, id2) { return id1 < id2 ? `${id1}-${id2}` : `${id2}-${id1}`; }
function recordPairing(id1, id2) {
    const key = getPairKey(id1, id2);
    if (!pairingHistory[key]) pairingHistory[key] = 0;
    pairingHistory[key]++;
}
// ✨ แก้ตรงนี้: ใส่ปีกกาปิด } ให้เรียบร้อย
function getPairCount(id1, id2) { return pairingHistory[getPairKey(id1, id2)] || 0; }


// ✨ ฟังก์ชันเกี่ยวกับคู่แข่ง (ตอนนี้ออกมาอยู่ข้างนอกแล้ว ใช้งานได้ปกติ)
function recordOpponent(id1, id2) {
    const key = getPairKey(id1, id2);
    if (!opponentHistory[key]) opponentHistory[key] = 0;
    opponentHistory[key]++;
}


function getOpponentCount(id1, id2) {
    return opponentHistory[getPairKey(id1, id2)] || 0;
}
function addPlayers() {
    const input = document.getElementById('new-players');
    const rawText = input.value.trim();
    if (!rawText) return;
    const names = rawText.split('\n').map(n => n.trim()).filter(n => n);
    let maxGamesInSystem = 0;
    players.forEach(p => { if(p.gamesPlayed > maxGamesInSystem) maxGamesInSystem = p.gamesPlayed; });


    names.forEach(name => {
        let cleanName = name.replace(/^[\d]+\.[\s]*/, '');
        let joinTime = Date.now();
        let isFastPass = false;
        if (maxGamesInSystem > 2) {
            joinTime = Date.now() - (60 * 60 * 1000);
            isFastPass = true;
        }
        players.push({
            id: Date.now() + Math.random(),
            name: cleanName,
            level: 'BG', // ✨
            gamesPlayed: 0,
            wins: 0,
            status: 'waiting',
            joinedQueueAt: joinTime,
            bookingId: null,
            winStreak: 0, // ✨ NEW: เริ่มต้นที่ 0
            sessionGames: 0,
            isFastPass: isFastPass,
            checkInTime: new Date(),
            isResting: false // ✨ เพิ่มบรรทัดนี้: มาถึงต้องตื่นก่อน
        });
    });
    input.value = '';
    updateQueueDisplay();
    saveData();
}


const removePlayer = (id) => {
    const p = players.find(x => x.id === id);
    if (!p) return;


    // เช็คก่อนลบ: ถ้าเล่นอยู่ ห้ามลบ
    if(p.status === 'playing') { alert('เล่นอยู่ ลบไม่ได้ครับ'); return; }


    // ✨ NEW: ถ้าติดจองอยู่ ต้องเคลียร์จองเพื่อนด้วย ไม่งั้นบั๊ก
    if (p.bookingId) {
        const others = players.filter(x => x.bookingId === p.bookingId && x.id !== id);
        if (others.length > 0) {
            if(!confirm(`⚠️ ${p.name} ติดจองอยู่กับ (${others.map(o=>o.name).join(', ')}) \nถ้าลบ Booking ของทั้งกลุ่มจะหายไปด้วย ยืนยันไหม?`)) return;
           
            // ล้าง Booking คนที่เหลือ (ให้กลายเป็นโสด)
            players.forEach(x => {
                if(x.bookingId === p.bookingId) {
                    x.bookingId = null;
                    x.bookingTeam = null;
                }
            });
        }
    } else {
        if(!confirm(`ต้องการลบ ${p.name} ใช่ไหม?`)) return;
    }


    // ลบคนออกจากอาเรย์
    players = players.filter(p => p.id !== id);
    updateQueueDisplay();
    saveData();
};




function resetStatsOnly() {
    if(!confirm('รีเซ็ตสถิติ?')) return;
    players.forEach(p => {
        p.gamesPlayed = 0; p.wins = 0; p.sessionGames = 0;
        p.status = 'waiting'; p.joinedQueueAt = Date.now(); p.bookingId = null; p.isFastPass = false;
    });
    pairingHistory = {};
    opponentHistory = {}; // ✨ NEW: ล้างประวัติศัตรู
    matchLogs = [];
    renderMatchLog();
    resetCourtsState();
    updateQueueDisplay();
}


function resetAll() {
    if(!confirm('⚠️ คุณต้องการ "ล้างข้อมูลทั้งหมด" ใช่ไหม?\n(ผู้เล่น, สถิติ, ประวัติ จะหายเกลี้ยง!)')) return;
    if(!confirm('⚠️ ยืนยันครั้งที่ 2: ข้อมูลจะกู้คืนไม่ได้นะ เอาจริงดิ?')) return;


    players = [];
    pairingHistory = {};
    opponentHistory = {};
    matchLogs = [];
    courts.forEach(c => {
        clearInterval(c.interval);
        c.players = [];
        c.state = 'empty';
        c.timer = 0;
    });
   
    localStorage.removeItem(STORAGE_KEY); // ✨ ล้าง LocalStorage
   
    renderMatchLog();
    renderCourts();
    updateQueueDisplay();
}


function resetCourtsState() {
    courts.forEach(c => {
        clearInterval(c.interval);
        c.players = []; c.state = 'empty'; c.timer = 0; c.isOpened = false; c.autoStartTarget = null;
    });
    renderCourts();
}


function updateCourts(change) {
    const newCount = courtCount + change;
    if (newCount < 1) return;
    courtCount = newCount;
    document.getElementById('court-count').innerText = courtCount;
    document.getElementById('calc-court-count').value = courtCount;
    updateCustomHoursInputs();
    renderCourts();
}


function renderCourts() {
    const container = document.getElementById('courts-container');
   
    // เติมคอร์ทให้ครบตามจำนวน
    if (courts.length < courtCount) {
        for (let i = courts.length; i < courtCount; i++) {
            courts.push({ id: i, players: [], state: 'empty', timer: 0, interval: null, isOpened: false, autoStartTarget: null });
        }
    } else if (courts.length > courtCount) {
        const removed = courts.pop();
            if (removed.players.length > 0) {
            removed.players.forEach(p => {
                const pl = players.find(x => x.id === p.id);
                if(pl) { pl.status = 'waiting'; pl.joinedQueueAt = Date.now(); pl.sessionGames = 0; }
            });
        }
    }
   
    container.innerHTML = '';
   
    courts.forEach((court, index) => {
        let overlayHTML = '';
        if (court.state === 'post_game') {
            overlayHTML = `
                <div class="court-overlay">
                    <button class="btn-overlay btn-call" onclick="triggerFill(${index})">📢 เรียกคนลง</button>
                    <button class="btn-overlay btn-rest" onclick="closeAndRest(${index})">🔴 พักคอร์ท</button>
                </div>
            `;
        } else if (!court.isOpened) {
            overlayHTML = `
                <div class="court-overlay">
                    <button class="btn-overlay btn-open" onclick="openCourt(${index})">🔔 เปิดสนาม</button>
                </div>
            `;
        }
       
        // ✨ Logic ชื่อคอร์ท
        const displayName = court.customName || `#${index + 1}`;


        const courtHTML = `
            <div class="court" id="court-${index}">
                <div class="court-lines"></div>
                <div class="service-line-top"></div>
                <div class="service-line-bottom"></div>
               
                <div class="court-header" style="position: relative; z-index: 10;">
                    <span onclick="editCourtName(${index})" style="cursor:pointer; display:flex; align-items:center; gap:5px;" title="จิ้มเพื่อเปลี่ยนชื่อ">
                        ${displayName} <span style="font-size:0.8em; opacity:0.6;">✏️</span>
                    </span>
                    <small>${getRuleLabel()}</small>
                </div>
               
                ${overlayHTML}
               
                <div class="court-players">
                    <div class="team team-pink">${renderPlayerOnCourt(court.players[0], index, 0)}${renderPlayerOnCourt(court.players[1], index, 1)}</div>
                    <div class="team team-blue">${renderPlayerOnCourt(court.players[2], index, 2)}${renderPlayerOnCourt(court.players[3], index, 3)}</div>
                </div>
                <div class="court-controls">
                    <div class="timer" id="timer-${index}">${formatTime(court.timer)}</div>
                    ${renderCourtButtons(court, index)}
                </div>
            </div>
        `;
        container.innerHTML += courtHTML;
    });
    updateQueueDisplay();
    updateDashboard();
}


function openCourt(idx) { courts[idx].isOpened = true; renderCourts(); }
function triggerFill(idx) { courts[idx].state = 'empty'; renderCourts(); }
function closeAndRest(idx) {
    courts[idx].players.forEach(p => sendToQueue(p.id));
    courts[idx].players = []; courts[idx].state = 'empty'; courts[idx].isOpened = false; courts[idx].timer = 0;
    renderCourts();
}
function getRuleLabel() { return document.getElementById('game-rule').value === 'winner_stay' ? "Fixed Quota" : ""; }
function renderPlayerOnCourt(player, courtIdx, slotIdx) {
    if (!player) {
        return `<div class="player-on-court" style="cursor:pointer; opacity:0.7; background:#f0f0f0; color:#888; border:2px dashed #ccc;" onclick="openManualAddModal(${courtIdx})" title="จิ้มเพื่อเลือกคนลง">
            + ว่าง
        </div>`;
    }
    const rule = document.getElementById('game-rule').value;

}

// --- 🧠 SMART AUTO FILL (V5.1 Wave's Logic) ---
// แก้ไข: ตัดการเติมคนอัตโนมัติออก เหลือไว้แค่ระบบนับถอยหลังเริ่มเกม
const autoFillCourts = () => {
    courts.forEach((court, idx) => {
        // เงื่อนไขพื้นฐาน: ต้องเปิดอยู่ / ไม่ได้เล่นอยู่ / ไม่ได้รอเคลียร์ผล
        if (!court.isOpened || court.state === 'playing' || court.state === 'post_game') return;


        // --- ❌ LOGIC เดิมที่เติมคนอัตโนมัติ โดนลบออกแล้ว ---


        // ✅ LOGIC ใหม่: ทำงานเฉพาะตอนคนครบ 4 แล้วเท่านั้น (เพื่อนับถอยหลัง)
        if (countRealPlayers(court) === 4) {
            if (!court.autoStartTarget) {
                court.autoStartTarget = Date.now() + (AUTO_START_DELAY * 1000);
                renderCourts();
            }
            else if (Date.now() >= court.autoStartTarget) {
                startGame(idx);
            }
            else {
                // อัปเดตตัวเลขถอยหลังที่ปุ่มแบบ Real-time
                const btn = document.querySelector(`#court-${idx} .btn-auto-start`);
                if (btn) btn.innerHTML = `เริ่ม (Auto ${Math.ceil((court.autoStartTarget - Date.now()) / 1000)}s)`;
            }
        } else {
             // ถ้าคนไม่ครบ (เช่น กดเตะออก) ให้ยกเลิกการนับถอยหลังทันที
             court.autoStartTarget = null;
        }
    });
};


// ค้นหา fillCourtSmart แล้วแก้เป็นตัวนี้
const fillCourtSmart = (courtIdx) => {
    const court = courts[courtIdx];
    const existingPlayers = court.players.filter(p => p !== null && p !== undefined);
    const needed = 4 - existingPlayers.length;

    // เช็คหัวแถวเพื่อเก็บสถิติ Skip (เหมือนเดิม)
    const waiting = players.filter(p => p.status === 'waiting' && !p.isResting && !p.bookingId)
                           .sort((a, b) => a.joinedQueueAt - b.joinedQueueAt);
    const headOfQueue = waiting.length > 0 ? waiting[0] : null;

    // 🔍 รอบที่ 1: หาแบบเคร่งครัด (Strict Mode)
    let candidates = getSmartDraft(needed, new Set(), existingPlayers, false); // false = ไม่ Force

    // ⚠️ รอบที่ 2: ถ้าหาไม่ได้ ให้หาแบบหยวนๆ (Force Mode)
    if (candidates.length === 0 && waiting.length >= needed) {
        console.log("⚠️ หาแบบตรงสเปคไม่ได้... กำลังเปิดโหมดหยวนๆ (Force Mode)");
        candidates = getSmartDraft(needed, new Set(), existingPlayers, true); // true = Force
    }
   
    if (candidates.length > 0) {
        // เช็ค Skip Count
        if (headOfQueue) {
            const isHeadPicked = candidates.some(c => c.id === headOfQueue.id);
            if (!isHeadPicked) {
                headOfQueue.skipCount = (headOfQueue.skipCount || 0) + 1;
            } else {
                headOfQueue.skipCount = 0;
            }
        }

        candidates.forEach(p => {
            p.status = 'playing';
            p.sessionGames = 0;
            if(p.isFastPass) p.isFastPass = false;
            p.bookingId = null;
            p.bookingTeam = null;
            addPlayerToCourt(court, p);
        });
        renderCourts();
    } else {
        // ถ้า Force แล้วยังไม่ได้ แปลว่าคนไม่พอจริงๆ (น้อยกว่า 4 คน)
        alert('❌ คนในคิวไม่พอครับ (ต้องการ ' + needed + ' คน)');
    }
    saveData();
};


// ปุ่ม 2: ตามคิว (Queue Fill)
const fillCourtQueue = (courtIdx) => {
    const court = courts[courtIdx];


    // 🔴 แก้ตรงนี้: ใช้ countRealPlayers นับคนจริงๆ
    const needed = 4 - countRealPlayers(court);
   
    const waiting = players
        .filter(p => p.status === 'waiting'&& !p.isResting)
        .sort((a, b) => a.joinedQueueAt - b.joinedQueueAt);


    if (waiting.length === 0) { alert('ไม่มีคนรอคิวครับ'); return; }


    const firstP = waiting[0];
    let candidates = [];


    // 🛡️ กรณี 1: คนแรก "มี Booking"
    if (firstP.bookingId) {
        const group = waiting.filter(p => p.bookingId === firstP.bookingId);
        group.sort((a, b) => (a.bookingTeam || 0) - (b.bookingTeam || 0));


        if (group.length > needed) {
            alert(`⚠️ ลงไม่ได้! คิวต่อไปคือ Booking (${group.length} คน) แต่ที่ว่างเหลือแค่ ${needed} ที่`);
            return;
        }
        candidates = group;
    }
    // 🛡️ กรณี 2: มาเดี่ยว
    else {
        for (let i = 0; i < waiting.length; i++) {
            if (candidates.length >= needed) break;
            const p = waiting[i];
            if (p.bookingId) break;
            candidates.push(p);
        }
    }


    if (candidates.length > 0) {
      // ✨ NEW: ก่อนลงสนาม ถ้าครบ 4 คน ให้เกลี่ยทีมก่อน
        if (candidates.length === 4) {
            candidates = autoBalanceTeam(candidates);
        }
        candidates.forEach(p => {
            p.status = 'playing';
            p.sessionGames = 0;
            if(p.isFastPass) p.isFastPass = false;
            // ใช้ addPlayerToCourt ยัดลงรู
            addPlayerToCourt(court, p);
        });
        renderCourts();
    }
};
// แก้ไข: เพิ่ม Logic ป้องกันการฉีกกลุ่มจอง (ถ้าคนจองเยอะกว่าที่ว่าง จะไม่ดึง)
// แก้ไข: เพิ่ม excludeIds (Set) เพื่อให้ข้ามคนที่ถูกเลือกไปแล้วใน Simulation ได้
// แก้ไข: getSmartDraft ให้ฉลาดขึ้นด้วย Auto Balance
// ฟังก์ชันดึงคนลงสนาม (Smart Draft)
// แก้หัวฟังก์ชันรับ parameter เพิ่ม และเพิ่ม Logic เช็ค Rank
// ค้นหา getSmartDraft ตัวเดิม แล้วทับด้วยตัวนี้
// แก้หัวฟังก์ชันรับ isForce (ค่า Default = false)
function getSmartDraft(count, excludeIds = new Set(), existingPlayers = [], isForce = false) {
    let pool = players.filter(p => p.status === 'waiting' && !p.isResting && !excludeIds.has(p.id));
    pool.sort((a, b) => a.joinedQueueAt - b.joinedQueueAt); 

    if (pool.length === 0) return [];

    // ✨ คำนวณพลังคู่แข่งรอไว้เลย (ถ้ามี)
    let targetScore = null;
    if (existingPlayers.length > 0) {
        targetScore = existingPlayers.reduce((sum, p) => sum + (RANK_SCORES[p.level||'BG']||1), 0);
    }

    // Pity Logic (สำหรับคนรอนานแบบน่าสงสาร)
    const head = pool[0];
    if (head && head.skipCount > 0 && !isForce) {
        let team = tryBuildTeam(head, pool, count, existingPlayers, true, targetScore, false);
        if (team.length === count) return team; 
    }

    // Normal & Force Logic
    for (let i = 0; i < pool.length; i++) {
        let captain = pool[i];
        
        // ถ้าไม่ใช่ Force -> เช็ค Rank กัปตันก่อน (เหมือนเดิม)
        if (!isForce && isRankedMode && existingPlayers.length > 0) {
             const capScore = RANK_SCORES[captain.level || 'BG'] || 1;
             let isCompatible = true;
             for(let ex of existingPlayers) {
                 const exScore = RANK_SCORES[ex.level || 'BG'] || 1;
                 if (Math.abs(capScore - exScore) >= 2) { isCompatible = false; break; }
             }
             if (!isCompatible) continue; 
        }
        
        // ✨ ส่ง targetScore เข้าไปให้ tryBuildTeam ด้วย (แม้จะเป็น Force Mode ก็ต้องใช้!)
        let team = tryBuildTeam(captain, pool, count, existingPlayers, false, targetScore, isForce); 
        
        if (team.length === count) {
            if (count === 4 && !isForce) return autoBalanceTeam(team);
            return team;
        }
    }
    
    return [];
}

// ✨ Helper Function ใหม่: เช็คความเข้ากันได้ของ Rank (เอาไปแปะต่อท้าย getSmartDraft ก็ได้)
function isRankCompatible(player, targetPlayers) {
    const pScore = RANK_SCORES[player.level || 'BG'] || 1;
    for (let target of targetPlayers) {
        const tScore = RANK_SCORES[target.level || 'BG'] || 1;
        // ถ้าห่างกันตั้งแต่ 2 ขั้นขึ้นไป (เช่น BG เจอ S) ถือว่าไม่ผ่าน
        if (Math.abs(pScore - tScore) >= 2) return false; 
    }
    return true;
}

// ✨ แก้ไข: ฟังก์ชันจัดทีม (ให้ฉลาดเลือกคู่แข่งด้วย ไม่ใช่หยิบตามคิวอย่างเดียว)
// แก้หัวฟังก์ชันรับ parameter เพิ่ม: isPity, targetScore
// รับ parameter isForce เพิ่มท้ายสุด
function tryBuildTeam(captain, currentPool, targetCount, existingPlayers = [], isPity = false, targetScore = null, isForce = false) {
    let selected = [];
    let usedIds = new Set();

    if (captain.bookingId) {
        const group = currentPool.filter(x => x.bookingId === captain.bookingId);
        if (group.length > targetCount) return [];
        group.sort((a, b) => (a.bookingTeam || 0) - (b.bookingTeam || 0));
        group.forEach(p => { selected.push(p); usedIds.add(p.id); });
    } else {
        selected.push(captain);
        usedIds.add(captain.id);
    }

    while (selected.length < targetCount) {
        let nextPlayer = null;
       
        if (selected.length % 2 !== 0 && !selected[selected.length-1].bookingId) {
            let currentSolo = selected[selected.length - 1];
            // ✨ ส่ง isForce ไปด้วย
            nextPlayer = findBestPartnerInfinite(currentSolo, currentPool, usedIds, existingPlayers, isPity, targetScore, isForce);
        } 
        else {
            const effectiveTeam = [...selected, ...existingPlayers];
            nextPlayer = findBestOpponentInfinite(effectiveTeam, currentPool, usedIds);
        }

        if (nextPlayer) {
            selected.push(nextPlayer);
            usedIds.add(nextPlayer.id);
        } else {
            break; 
        }
    }
    return selected;
}

// แก้ฟังก์ชันหาคู่หู ให้รับ rankCheckList (คือคนในสนาม)
// แก้หัวฟังก์ชันรับ isPity, targetScore
function findBestPartnerInfinite(captain, fullPool, usedIds, rankCheckList = [], isPity = false, targetScore = null, isForce = false) {
    let best = null;
    let minScore = Infinity;
    
    const capScore = RANK_SCORES[captain.level || 'BG'] || 1;
   
    for (let i = 0; i < fullPool.length; i++) {
        const c = fullPool[i];
        if (c.id === captain.id || usedIds.has(c.id) || c.bookingId) continue;
       
        let finalScore = 0;

        // 🔥 กรณี FORCE MODE: สูตร "หยวนๆ แบบมีสมอง"
        if (isForce) {
            // 1. ค่าคิว (Queue Cost): ยิ่งรอนาน (i น้อย) ยิ่งดี
            // คิดเป็นคนละ 1000 แต้ม
            // (ใครมาทีหลัง หรือเพิ่งออก โดนบวกแต้มเยอะ ทำให้ไม่ถูกเลือก)
            const queueCost = i * 1000; 

            // 2. ค่าสมดุล (Balance Cost): พยายามให้พลังทีม ใกล้เคียงคู่แข่ง
            let balanceCost = 0;
            if (targetScore !== null) {
                const myTeamScore = capScore + (RANK_SCORES[c.level||'BG']||1);
                const diff = Math.abs(myTeamScore - targetScore);
                // ยอมข้ามคิวได้ 2-3 คน เพื่อแลกกับ Balance ที่ดีขึ้น 1 ขั้น
                // 1 Level Gap = 2500 แต้ม
                balanceCost = diff * 2500; 
            }

            // 3. ค่าคู่ซ้ำ (Pair Cost): ยอมให้ซ้ำได้ แต่ถ้าเลือกได้ขอคนใหม่
            const pairCount = getPairCount(captain.id, c.id);
            const pairCost = pairCount * 3000; 

            finalScore = queueCost + balanceCost + pairCost;
        }
        // 🛡️ กรณีปกติ / Pity (Logic เดิม)
        else {
            if (isPity && targetScore !== null) {
                 const cScore = RANK_SCORES[c.level || 'BG'] || 1;
                 const ourTeamSum = capScore + cScore;
                 const diff = Math.abs(ourTeamSum - targetScore);
                 // Pity เน้น Balance มากกว่าคิวนิดหน่อย
                 finalScore = (getPairCount(captain.id, c.id) * 1000000) + (diff * 1000) + i;
            } else {
                // Strict Mode
                const pairPenalty = (getPairCount(captain.id, c.id) >= 2) ? 999999999 : getPairCount(captain.id, c.id) * 1000000;
                let rankPenalty = 0;
                if (isRankedMode) {
                    const cScore = RANK_SCORES[c.level || 'BG'] || 1;
                    const diffCap = Math.abs(capScore - cScore);
                    if (diffCap === 1) rankPenalty += 5000000;
                    if (diffCap >= 2) rankPenalty += 500000000;

                    for(let existing of rankCheckList) {
                        const exScore = RANK_SCORES[existing.level || 'BG'] || 1;
                        const diffEx = Math.abs(cScore - exScore);
                        if (diffEx === 1) rankPenalty += 5000000;
                        else if (diffEx >= 2) rankPenalty += 500000000;
                    }
                }
                finalScore = pairPenalty + rankPenalty + i;
            }
        }
       
        if (finalScore < minScore) {
            minScore = finalScore;
            best = c;
        }
    }
    return best;
}




// ค้นหาฟังก์ชันเดิม แล้วทับด้วยอันนี้
function findBestPartnerInfinite(captain, fullPool, usedIds) {
    let best = null;
    let minScore = Infinity;
   
    for (let i = 0; i < fullPool.length; i++) {
        const c = fullPool[i];
       
        if (c.id === captain.id || usedIds.has(c.id) || c.bookingId) continue;
       
        const count = getPairCount(captain.id, c.id);
        const pairPenalty = (count >= 2) ? 999999999 : count * 1000000;

        // ✨ RANKED LOGIC: คำนวณความต่างชั้น
        let rankPenalty = 0;
        if (isRankedMode) {
            const capScore = RANK_SCORES[captain.level || 'BG'] || 1;
            const cScore = RANK_SCORES[c.level || 'BG'] || 1;
            const diff = Math.abs(capScore - cScore);
            
            // ถ้าต่างกัน 1 ขั้น (เช่น N กับ S) ปรับ 5 ล้าน (พอรับได้ถ้าคนขาด)
            // ถ้าต่างกัน 2 ขั้นขึ้นไป (เช่น BG กับ S) ปรับ 500 ล้าน (ห้ามจับคู่เด็ดขาดถ้ามีทางเลือกอื่น)
            if (diff === 1) rankPenalty = 5000000;
            else if (diff >= 2) rankPenalty = 500000000;
        }

        const score = pairPenalty + rankPenalty + i; // +i คือให้ความสำคัญกับคิวก่อนหลังด้วยนิดนึง
       
        if (score < minScore) {
            minScore = score;
            best = c;
        }
    }
    return best;
}

// ค้นหาฟังก์ชันเดิม แล้วทับด้วยอันนี้
function findBestOpponentInfinite(currentTeam, fullPool, usedIds) {
    let best = null;
    let minScore = Infinity;
   
    for (let i = 0; i < fullPool.length; i++) {
        const c = fullPool[i];
       
        if (usedIds.has(c.id) || c.bookingId) continue;
       
        // คำนวณความ "หน้าซ้ำ"
        let conflictScore = 0;
        currentTeam.forEach(member => {
            const opCount = getOpponentCount(member.id, c.id);
            conflictScore += (opCount >= 2) ? 100000000 : (opCount * 1000000);
        });

        // ✨ RANKED LOGIC: เช็คว่า "ศัตรู" ฝีมือห่างกับ "ทีมเรา" ไหม
        let rankPenalty = 0;
        if (isRankedMode) {
            const cScore = RANK_SCORES[c.level || 'BG'] || 1;
            
            // วนลูปเช็คกับทุกคนในทีมปัจจุบัน
            let maxDiff = 0;
            currentTeam.forEach(member => {
                const mScore = RANK_SCORES[member.level || 'BG'] || 1;
                const diff = Math.abs(mScore - cScore);
                if (diff > maxDiff) maxDiff = diff;
            });

            // ถ้าในทีมมีคนยศห่างกับคนนี้มากเกินไป ให้ลงโทษหนักๆ
            if (maxDiff === 1) rankPenalty = 5000000;
            else if (maxDiff >= 2) rankPenalty = 500000000;
        }

        const totalScore = conflictScore + rankPenalty + i;
       
        if (totalScore < minScore) {
            minScore = totalScore;
            best = c;
        }
    }
    return best;
}

function startGame(courtIdx) {
    const court = courts[courtIdx];
    court.state = 'playing';
    court.gameStartTime = Date.now(); // ✅ จำเวลาเริ่ม
    court.timer = 0; // รีเซ็ตตัวเลขโชว์
    court.autoStartTarget = null;
   
    // 1. บันทึกคู่หู (เหมือนเดิม)
    if(court.players[0] && court.players[1]) recordPairing(court.players[0].id, court.players[1].id);
    if(court.players[2] && court.players[3]) recordPairing(court.players[2].id, court.players[3].id);

    // 2. บันทึกคู่แข่ง (เหมือนเดิม)
    const p0 = court.players[0]; const p1 = court.players[1];
    const p2 = court.players[2]; const p3 = court.players[3];
    if (p0 && p2) recordOpponent(p0.id, p2.id);
    if (p0 && p3) recordOpponent(p0.id, p3.id);
    if (p1 && p2) recordOpponent(p1.id, p2.id);
    if (p1 && p3) recordOpponent(p1.id, p3.id);

    renderCourts();
    saveData();
}


function stopGame(courtIdx) {
    const court = courts[courtIdx]; clearInterval(court.interval);
    court.players.forEach(p => { const pl = players.find(x => x.id === p.id); if(pl) { pl.gamesPlayed++; pl.sessionGames++; } });
    activeGameResolveCourtId = courtIdx; document.getElementById('winner-modal').style.display = 'flex';
}


function cancelStopGame() {
    const court = courts[activeGameResolveCourtId];
    court.players.forEach(p => { const pl = players.find(x => x.id === p.id); if(pl) { pl.gamesPlayed--; pl.sessionGames--; } });
    court.interval = setInterval(() => { court.timer++; document.getElementById(`timer-${activeGameResolveCourtId}`).innerText = formatTime(court.timer); }, 1000);
    document.getElementById('winner-modal').style.display = 'none'; activeGameResolveCourtId = null; renderCourts();
}


function resolveGame(winningTeamIdx) {
    const court = courts[activeGameResolveCourtId];
    document.getElementById('winner-modal').style.display = 'none';


    // กรณี 1: ยกเลิกเกม (ไม่มีใครชนะ/แพ้) -> ทุกคนเด้งออกไปต่อคิวใหม่
    if (winningTeamIdx === -1) {
        court.players.forEach(p => sendToQueue(p.id));
        court.players = [];
        court.state = 'post_game';
    }
    // กรณี 2: มีแพ้/ชนะ
    else {
        const t1 = [court.players[0], court.players[1]];
        const t2 = [court.players[2], court.players[3]];
       
        let winners = (winningTeamIdx === 0) ? t1 : t2;
        let losers = (winningTeamIdx === 0) ? t2 : t1;
       
        // บันทึก Log
        matchLogs.unshift({
            time: new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'}),
            court: activeGameResolveCourtId+1,
            winners: winners.map(p=>p.name).join(', '),
            losers: losers.map(p=>p.name).join(', '),
            duration: formatTime(court.timer)
        });
        renderMatchLog();
       
        // บวกสถิติชนะ
        winners.forEach(p => {
            const pl = players.find(x => x.id === p.id);
            if(pl) pl.wins++;
            pl.winStreak = (pl.winStreak || 0) + 1; // ✨ บวกสตรีค
        });
        losers.forEach(p => {
            const pl = players.find(x => x.id === p.id);
            if(pl) {
                pl.winStreak = 0; // ✨ ล้างสตรีค
            }
        });


        let stayers = [], leavers = [];
       
        // --- 🔍 จุดที่แก้: เช็คโหมดเกมก่อน! ---
        const rule = document.getElementById('game-rule').value;


        if (rule === 'normal') {
            // โหมด Normal: ออกหมดทุกคน ไม่สนลูกใคร!
            leavers.push(...t1, ...t2);
        } else {
            // โหมด Fixed Quota (Winner Stay แบบมีโควต้า 2 เกม)
            const q1 = players.find(x => x.id === t1[0].id).sessionGames;
            const q2 = players.find(x => x.id === t2[0].id).sessionGames;


            if (q1 < 2 && q2 < 2) {
                // ถ้าโควต้ายังไม่เต็มทั้งคู่ -> ผู้ชนะอยู่ต่อ, ผู้แพ้ออก
                if (winningTeamIdx === 0) { stayers.push(...t1); leavers.push(...t2); }
                else { stayers.push(...t2); leavers.push(...t1); }
            } else {
                // ถ้ามีใครโควต้าเต็ม (ครบ 2 เกม) -> ต้องออก
                if (q1 >= 2) leavers.push(...t1); else stayers.push(...t1);
                if (q2 >= 2) leavers.push(...t2); else stayers.push(...t2);
            }
        }
       
        // สั่งย้ายคน
        leavers.forEach(p => sendToQueue(p.id));
        court.players = [...stayers];
        court.state = 'post_game';
    }
    court.timer = 0;
    renderCourts();
    saveData();
}


function sendToQueue(playerId) { 
  const pl = players.find(x => x.id === playerId);
   if(pl) { 
        pl.status = 'waiting'; 
        pl.joinedQueueAt = Date.now(); 
        pl.sessionGames = 0; 
    } }
// เปลี่ยนเป็น Modern Syntax (Arrow Function)
// แก้ไข: ลบคนออกแบบ "เจาะรู" (Fixed Slot) ไม่ให้คนอื่นเลื่อนตำแหน่ง
const kickPlayer = (courtIdx, slotIdx) => {
    const court = courts[courtIdx];
    const player = court.players[slotIdx];


    if (!player) return; // ถ้าว่างอยู่แล้วก็จบ
    if (!confirm(`ต้องการเปลี่ยนตัว ${player.name} ออกใช่ไหม?`)) return;


    // 1. ดึงคนกลับไปต่อคิว
    sendToQueue(player.id);
   
    // 2. ✨ แก้ตรงนี้: เปลี่ยนเป็น null แทนการ splice
    court.players[slotIdx] = null;
   
    // 3. หยุดเกมถ้าเล่นอยู่
    if (court.state === 'playing') {
        clearInterval(court.interval);
        court.state = 'empty';
        console.log(`Game paused at ${court.timer}s`);
    }
   
    court.autoStartTarget = null;
    renderCourts();
};
// --- UI HELPERS ---
function renderMatchLog() {
    const tbody = document.getElementById('match-log-body');
    if (matchLogs.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="color:gray;">-</td></tr>'; return; }
    tbody.innerHTML = matchLogs.map(log => `<tr><td>${log.time}</td><td>${log.court}</td><td class="log-winner">${log.winners}</td><td class="log-loser">${log.losers}</td><td>${log.duration}</td></tr>`).join('');
}


function updateDashboard() {
    const tbody = document.getElementById('stats-body');
    const sortType = document.getElementById('sort-select').value;
   
    let sorted = [...players].sort((a, b) => {
        if (sortType === 'games_desc') return b.gamesPlayed - a.gamesPlayed;
        if (sortType === 'games_asc') return a.gamesPlayed - b.gamesPlayed;
        if (sortType === 'wins_desc') return b.wins - a.wins;
        return 0;
    });


    tbody.innerHTML = sorted.map((p, index) => {
        let rank = index + 1;
        let medal = '';
        if (rank === 1) medal = '🥇'; else if (rank === 2) medal = '🥈'; else if (rank === 3) medal = '🥉';
        const rate = p.gamesPlayed > 0 ? Math.round((p.wins / p.gamesPlayed) * 100) : 0;
        return `<tr><td>${medal} ${rank}</td><td>${p.name}</td><td>${p.gamesPlayed}</td><td>${p.wins}</td><td>${rate}%</td></tr>`;
    }).join('');
}

// ==========================================
// 💰 LOGIC หารค่าสนามแบบแฟร์ๆ (Time-based)
// ==========================================


function updateCost() {
    // 1. คำนวณยอดรวม (Grand Total) เหมือนเดิมเป๊ะ
    const pricePerHr = parseFloat(document.getElementById('calc-court-price').value) || 0;
    let totalHours = 0;


    if (isCustomHours) {
        document.querySelectorAll('.court-hr-input').forEach(inp => totalHours += parseFloat(inp.value) || 0);
    } else {
        totalHours = (parseFloat(document.getElementById('calc-hours').value) || 0) * (parseFloat(document.getElementById('calc-court-count').value) || 0);
    }


    const shuttlePrice = parseFloat(document.getElementById('calc-shuttle-price').value) || 0;
    const shuttleUsed = parseFloat(document.getElementById('calc-shuttle-used').value) || 0;
    const shuttleTotal = (shuttlePrice / 12) * shuttleUsed;


    const grandTotal = (totalHours * pricePerHr) + shuttleTotal;
   
    // แสดงยอดรวมที่หน้าจอ
    document.getElementById('total-cost-display').innerText = grandTotal.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});


    // 2. --- ส่วนที่เพิ่ม: คำนวณค่าใช้จ่ายรายคน ---
    const now = new Date();
    let totalMinutesAllPlayers = 0;


    // รอบที่ 1: นับเวลารวมของทุกคน (หน่วยนาที)
    players.forEach(p => {
        if (p.checkInTime) {
            // คำนวณระยะเวลาตั้งแต่ Check-in จนถึงปัจจุบัน (หน่วยนาที)
            const diffMs = now - new Date(p.checkInTime);
            p.minutesPresent = Math.max(1, Math.floor(diffMs / 60000)); // อยู่อย่างน้อย 1 นาที
        } else {
            p.minutesPresent = 0;
        }
        totalMinutesAllPlayers += p.minutesPresent;
    });


    // รอบที่ 2: เทียบบัญญัติไตรยางศ์ (เวลาของกู / เวลารวมทั้งหมด) * ยอดเงินรวม
    players.forEach(p => {
        if (totalMinutesAllPlayers > 0 && grandTotal > 0) {
            p.calculatedCost = (p.minutesPresent / totalMinutesAllPlayers) * grandTotal;
        } else {
            p.calculatedCost = 0;
        }
    });


    // 3. สั่งวาดตารางใหม่ทันที เพื่อโชว์ตัวเลข (ส่ง true เพื่อบอกว่าไม่ต้องเรียก updateCost ซ้ำ)
    renderOverview(true);
}


function renderOverview(skipUpdateCost = false) {
    const statsBody = document.getElementById('overview-stats-body');
    const repeatBody = document.getElementById('overview-repeat-body');
   
    // วาดตารางรายชื่อ + ราคาที่คำนวณแล้ว
    statsBody.innerHTML = players.map(p => {
        let time = p.checkInTime ? new Date(p.checkInTime).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'}) : '-';
        // ปัดเศษเงินให้สวยๆ (Ceil = ปัดขึ้นให้เศษสตางค์ไม่หาย)
        let costShow = p.calculatedCost ? Math.ceil(p.calculatedCost) : 0;
       
        return `
            <tr>
                <td style="text-align:left">
                    ${p.name}
                    <div style="font-size:0.75em; color:gray;">(อยู่มา ${p.minutesPresent || 0} น.)</div>
                </td>
                <td>${time}</td>
                <td>${p.gamesPlayed}</td>
                <td>${p.wins}</td>
                <td style="font-weight:bold; color:#27ae60;">${costShow} ฿</td>
            </tr>`;
    }).join('');


    // ส่วนคู่ซ้ำ (เหมือนเดิม)
    let repeats = [];
    for (const [key, count] of Object.entries(pairingHistory)) {
        if (count > 1) {
            const [id1, id2] = key.split('-');
            const p1 = players.find(p => p.id == id1); const p2 = players.find(p => p.id == id2);
            if (p1 && p2) repeats.push({ name: `${p1.name} + ${p2.name}`, count: count });
        }
    }
    repeats.sort((a, b) => b.count - a.count);
    repeatBody.innerHTML = repeats.length === 0 ? '<tr><td colspan="2" style="color:green;">ไม่มีคู่ซ้ำ</td></tr>' : repeats.map(s => `<tr><td style="text-align:left;">${s.name}</td><td style="color:#e65100; font-weight:bold;">${s.count}</td></tr>`).join('');


    // เรียก updateCost เฉพาะตอนที่ไม่ได้ถูกเรียกมาจาก updateCost (กัน Loop นรก)
    if (!skipUpdateCost) updateCost();
}

// แก้ไข: บันทึกข้อมูล Team (1 หรือ 2) ลงไปในตัวผู้เล่นด้วย
const confirmBooking = () => {
    const ids = [];
    if (currentBookingType === 'pair') {
        ids.push({id: document.getElementById('b-p1').value, team: 1});
        ids.push({id: document.getElementById('b-p2').value, team: 1});
    } else {
        ids.push({id: document.getElementById('b-p1').value, team: 1}); // T1 คนที่ 1
        ids.push({id: document.getElementById('b-p2').value, team: 1}); // T1 คนที่ 2
        ids.push({id: document.getElementById('b-p3').value, team: 2}); // T2 คนที่ 1
        ids.push({id: document.getElementById('b-p4').value, team: 2}); // T2 คนที่ 2
    }


    // ดัก Error: ห้ามเลือกคนซ้ำ!
    const unique = new Set(ids.map(x => x.id));
    if (unique.size !== ids.length) { alert('❌ เลือกชื่อซ้ำกันไม่ได้ครับ!'); return; }


    const bId = 'book-' + (++bookingCounter);
   
    ids.forEach(x => {
        const p = players.find(pl => pl.id == x.id);
        if (p) {
            p.bookingId = bId;
            p.bookingTeam = x.team; // ✨ เพิ่มฟิลด์นี้: ระบุทีมชัดเจน
        }
    });


    closeModal('booking-modal');
    updateQueueDisplay();
    renderCourts();
    saveData();
};
function updateQueueDisplay() {
    const list = document.getElementById('player-queue');
    const waiting = players.filter(p => p.status === 'waiting');
    waiting.sort((a, b) => a.joinedQueueAt - b.joinedQueueAt);
    document.getElementById('queue-count').innerText = waiting.length;


    // --- 🧮 LOGIC คำนวณเวลาแบบ Real-time ---
    const rule = document.getElementById('game-rule').value;
    const playersOutPerGame = (rule === 'winner_stay') ? 2 : 4;
    const avgGameTime = 15;
   
    let availableSlots = [];
    courts.forEach(c => {
        let remainingMins = 0;
        if (c.state === 'playing') {
            const playedMins = Math.floor(c.timer / 60);
            remainingMins = Math.max(0, avgGameTime - playedMins);
        }
        for (let i = 0; i < playersOutPerGame; i++) availableSlots.push(remainingMins);
    });
    availableSlots.sort((a, b) => a - b);
    const totalCapacity = availableSlots.length;


    list.innerHTML = waiting.map((p, index) => {
        const batchIndex = index % totalCapacity;
        const rounds = Math.floor(index / totalCapacity);
        const baseWait = availableSlots[batchIndex] !== undefined ? availableSlots[batchIndex] : 0;
        const estimatedWaitMins = baseWait + (rounds * avgGameTime);
       
        let badgeClass = 'wait-green'; let badgeText = `< ${estimatedWaitMins}m`;
        if (estimatedWaitMins > 20) { badgeClass = 'wait-red'; badgeText = `~${estimatedWaitMins}m`; }
        else if (estimatedWaitMins > 10) { badgeClass = 'wait-orange'; badgeText = `~${estimatedWaitMins}m`; }
        else if (estimatedWaitMins > 0) { badgeText = `~${estimatedWaitMins}m`; }
        else { badgeText = 'Now!'; badgeClass = 'wait-green'; }
       
        const itemClass = p.isResting ? 'player-item resting' : `player-item ${p.bookingId ? 'booked' : ''} ${p.isFastPass ? 'fastpass' : ''}`;
        const opacityStyle = p.isResting ? 'opacity: 0.6; background: #ddd;' : '';
        const namePrefix = p.isResting ? '💤 ' : (p.isFastPass ? '🚀 ' : '');


        // ✨ Level Badge
        const lv = p.level || 'BG';
        const lvColor = LEVEL_COLORS[lv] || '#bdbdbd';
        const levelBadge = `<span onclick="toggleLevel(${p.id})" style="cursor:pointer; background:${lvColor}; color:white; padding:2px 6px; border-radius:4px; font-size:0.8em; margin-right:5px; font-weight:bold; border:1px solid rgba(0,0,0,0.1); box-shadow: 0 1px 2px rgba(0,0,0,0.2);" title="กดเพื่อเปลี่ยนระดับ">${lv}</span>`;


        const waitBadge = !p.isResting
            ? `<span class="wait-badge ${badgeClass}" title="รอประมาณ ${estimatedWaitMins} นาที">${badgeText}</span>`
            : '<small style="color:gray; font-weight:bold; margin-left:5px;">(พัก)</small>';


        return `
            <li class="${itemClass}" style="${opacityStyle}">
                <div class="player-info">
                    ${!p.isResting ? levelBadge : ''}
                    <strong>${namePrefix}${p.name}</strong>
                    ${p.bookingId ? `<small style="cursor:pointer; font-size:1.2em;" onclick="cancelBooking('${p.bookingId}')" title="❌ ยกเลิกการจอง">🔒</small>` : ''}
                    ${waitBadge}
                </div>
               
                <button class="mini-btn ${p.isResting ? 'success' : 'secondary'}" style="margin-right:5px;" onclick="toggleRest(${p.id})">
                    ${p.isResting ? 'ตื่น' : '💤'}
                </button>
                <button class="mini-btn danger" onclick="removePlayer(${p.id})">×</button>
            </li>`;
    }).join('');
   
    updateNextMatchPanel();
}


function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }


// ✨ NEW: ฟังก์ชันยกเลิกการจอง (กดที่กุญแจ)
const cancelBooking = (bId) => {
    // หาดูซิว่ากลุ่มนี้มีใครบ้าง
    const group = players.filter(p => p.bookingId === bId);
    if(group.length === 0) return;


    if(!confirm(`ต้องการ "ยกเลิกการจอง" ของกลุ่มนี้ (${group.map(p=>p.name).join(', ')}) ใช่ไหม? \n(คนจะยังอยู่ในคิวเหมือนเดิม)`)) return;
   
    // ล้างค่า Booking ออกให้หมด
    players.forEach(p => {
        if(p.bookingId === bId) {
            p.bookingId = null;
            p.bookingTeam = null;
        }
    });
    updateQueueDisplay();
    saveData();
};


// ✨ NEW: สลับสถานะ พัก/พร้อม
const toggleRest = (id) => {
    const p = players.find(x => x.id === id);
    if (!p) return;
   
    // สลับค่า boolean (ถ้าไม่มีค่านี้มาก่อน ให้ถือว่าเป็น false)
    p.isResting = !p.isResting;
   
    updateQueueDisplay();
    renderCourts(); // สั่งวาดปุ่มใหม่ด้วย เผื่อคนพักเป็นหัวแถว
};


// ✨ NEW: เปิด Modal เลือกคนลงช่องว่าง (Manual Add)
let currentManualAddCourtIdx = null;






const openManualAddModal = (courtIdx) => {
    // 🔴 แก้ตรงนี้: ใช้ countRealPlayers แทน .length ไม่งั้นมันนับรูว่างไปด้วย
    if (countRealPlayers(courts[courtIdx]) >= 4) { alert('สนามเต็มแล้วเพื่อน!'); return; }


    currentManualAddCourtIdx = courtIdx;


    // กรองคนรอ (เหมือนเดิม: ไม่เอาคนพัก, ไม่เอาคนเล่นอยู่)
    const waiting = players
        .filter(p => p.status === 'waiting' && !p.isResting)
        .sort((a,b) => a.joinedQueueAt - b.joinedQueueAt);


    if (waiting.length === 0) { alert('ไม่มีคนรอคิวเลยว่ะ!'); return; }


    // สร้างปุ่มเลือกคน (List of Buttons)
    let html = `<h4>👇 เลือกคนลง คอร์ท ${courtIdx + 1}</h4>`;
    html += `<div style="display:flex; flex-direction:column; gap:5px;">`;
   
    waiting.forEach(p => {
        let label = p.bookingId ? `🔒 ${p.name} (Team)` : p.name;
        let style = p.bookingId ? 'background:#f3e5f5; color:#6a1b9a; border:1px solid #ce93d8;' : '';
       
        html += `<button class="secondary" style="text-align:left; ${style}" onclick="confirmManualAdd(${p.id})">
            ${p.isFastPass?'🚀 ':''}${label} <small style="float:right;">(${p.gamesPlayed}P)</small>
        </button>`;
    });
   
    html += `</div>`;


    document.getElementById('booking-inputs').innerHTML = html;
   
    // เปลี่ยนปุ่มข้างล่าง
    const modalActions = document.querySelector('#booking-modal .modal-actions');
    const oldActions = modalActions.innerHTML;
    modalActions.innerHTML = `<button class="secondary" onclick="closeModal('booking-modal'); restoreModal('${escape(oldActions)}');">ยกเลิก</button>`;
   
    document.getElementById('booking-modal').style.display = 'flex';
};


// ฟังก์ชันกู้คืนปุ่ม Modal เดิม (ตอนปิด)
window.restoreModal = (oldContent) => {
    document.querySelector('#booking-modal .modal-actions').innerHTML = unescape(oldContent);
};




// ✨ NEW: ยืนยันดึงคนลงสนาม (ฉบับรองรับ Fixed Slot)
const confirmManualAdd = (playerId) => {
    const court = courts[currentManualAddCourtIdx];
    const p = players.find(x => x.id === playerId);
    if (!p) return;
    if (countRealPlayers(court) >= 4) { alert('ช้าไป! สนามเต็มแล้ว'); return; }

    p.status = 'playing';
    p.sessionGames = 0;
    if(p.isFastPass) p.isFastPass = false;
    
    // ✨ เพิ่ม 2 บรรทัดนี้เหมือนกัน
    p.bookingId = null;
    p.bookingTeam = null;
   
    addPlayerToCourt(court, p);
    closeModal('booking-modal');
    
    // Restore buttons
    const actions = document.querySelector('#booking-modal .modal-actions');
    if (actions) actions.innerHTML = `<button class="secondary" onclick="closeModal('booking-modal')">ยกเลิก</button><button class="success" onclick="confirmBooking()">ยืนยัน</button>`;

    renderCourts();
};

// ✨ NEW: อัปเดตพาเนลคู่ถัดไป (Next Match) - แบบโชว์หลายคู่
function updateNextMatchPanel() {
    const container = document.getElementById('next-match-list');
    const rule = document.getElementById('game-rule').value;
    const needed = (rule === 'winner_stay') ? 2 : 4;
   
    let html = '';
    let excludeIds = new Set(); // รายชื่อคนที่ถูกเลือกไปแล้วใน Simulation
   
    // กำหนดจำนวนแมตช์ล่วงหน้าที่อยากโชว์ (เช่น โชว์เท่าจำนวนคอร์ทที่มี หรือจำกัดแค่ 4)
    const matchesToShow = Math.min(courtCount, 4);


    for (let i = 0; i < matchesToShow; i++) {
        // ดึงตัว โดยส่งรายชื่อคนที่ติดทีมไปแล้วในรอบก่อนๆ ไปด้วย (excludeIds)
        const candidates = getSmartDraft(needed, excludeIds);
       
        if (candidates.length < needed) {
            if (i === 0) html += `<div style="text-align:center; width:100%; color: #ccc;">⏳ รอคนครบทีม ...</div>`;
            break; // ถ้าหาคนไม่พอแล้ว ก็หยุดเลย
        }


        // เก็บ ID คนที่ได้เล่นรอบนี้ ไว้กันไม่ให้ซ้ำในรอบหน้า
        candidates.forEach(p => excludeIds.add(p.id));


        // --- สร้าง HTML ของแต่ละ Match ---
        html += `<div style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); min-width: 200px;">
            <div style="font-size:0.8em; color:#ddd; margin-bottom:5px;">📢 Match ${i + 1}</div>`;
       
        // ฟังก์ชันย่อยสร้างการ์ดจิ๋ว
        const createCard = (p, color) => `
            <div style="background:white; color:#333; padding:4px 8px; margin:2px 0; border-radius:4px; border-left:4px solid ${color}; font-size:0.9em; display:flex; justify-content:space-between;">
                <span>${p.isFastPass?'🚀':''} ${p.name}</span>
                ${p.bookingId ? '<span style="font-size:0.8em;">🔒</span>' : ''}
            </div>`;


        if (needed === 4) {
            html += `<div style="display:flex; gap:5px;">
                        <div style="flex:1;">${createCard(candidates[0], '#e74c3c')}${createCard(candidates[1], '#e74c3c')}</div>
                        <div style="display:flex; align-items:center; font-weight:bold; color:#fff; font-size:0.8em;">VS</div>
                        <div style="flex:1;">${createCard(candidates[2], '#3498db')}${createCard(candidates[3], '#3498db')}</div>
                     </div>`;
        } else {
            html += `<div style="display:flex; flex-direction:column; gap:2px;">
                        ${createCard(candidates[0], '#f1c40f')}
                        ${createCard(candidates[1], '#f1c40f')}
                     </div>`;
        }
        html += `</div>`;
    }


    container.innerHTML = html;
}
    // ✨ NEW: ฟังก์ชันเปลี่ยนชื่อคอร์ท
// ✨ NEW: ฟังก์ชันเปลี่ยนชื่อคอร์ท (แก้หัวฟังก์ชันนิดนึง)
function editCourtName(idx) {
    const currentName = courts[idx].customName || `#${idx + 1}`;
    const newName = prompt(`ตั้งชื่อคอร์ทที่ ${idx + 1} ใหม่ (เดิม: ${currentName})`, currentName);
   
    if (newName && newName.trim() !== "") {
        courts[idx].customName = newName.trim();
        renderCourts();
    }
}

// ✅ ของใหม่ (ใช้ตัวแปรที่ส่งมาจาก index.html):
const isViewer = (typeof APP_MODE !== 'undefined' && APP_MODE === 'viewer');
let syncInterval = null;


// ถ้าเป็น Viewer ให้ซ่อนปุ่มควบคุม แล้วเริ่มดึงข้อมูล
if (isViewer) {
    console.log("👀 VIEW MODE ACTIVATED");
    document.body.classList.add('view-mode');
   
    // ✨ UPDATE: สั่งดึงข้อมูลครั้งแรก "ทันที" ที่เปิดหน้าเว็บ (ไม่ต้องรอ 15 วิ)
    google.script.run.withSuccessHandler(restoreState).syncLoadState();
   
    // เริ่ม Loop ดึงข้อมูลทุก 15 วินาที (เพื่อประหยัดโควต้า)
    setInterval(() => {
        google.script.run.withSuccessHandler(restoreState).syncLoadState();
    }, 15000);
}


// ฟังก์ชันเริ่มถ่ายทอดสด (สำหรับ Master กด)
function toggleBroadcast() {
    const btn = document.getElementById('btn-broadcast');
   
    if (syncInterval) {
        clearInterval(syncInterval);
        syncInterval = null;
        btn.innerHTML = '📡 เริ่ม Live';
        btn.classList.remove('pulse');
        alert('📴 จบการ Live แล้ว');
    } else {
        if(!confirm('ต้องการเริ่ม "ถ่ายทอดสด" ไปยัง URL ใช่ไหม? \n(ข้อมูลจะถูกอัปเดตทุก 10 วินาที)')) return;
       
        syncInterval = setInterval(pushDataToCloud, 10000);
        pushDataToCloud();
       
        btn.innerHTML = '🔴 On Air';
        btn.classList.add('pulse');
       
        // เรียก Modal เลย ไม่ต้องประกาศตัวแปร url ตรงนี้แล้ว
        showShareLinkModal();
    }
}


// ส่งข้อมูลขึ้น Cloud (Master Only)
function pushDataToCloud() {
    // ย่อข้อมูลให้เล็กที่สุด (ตัด Logs ออก เดี๋ยวเต็ม)
    const state = {
        players: players,
        courts: courts,
        courtCount: courtCount, // ✨ ส่งจำนวนคอร์ทไปด้วย
        gameRule: document.getElementById('game-rule').value, // ✨ ส่งกติกาเกมไปด้วย
        timestamp: Date.now()
    };
    const json = JSON.stringify(state);
    google.script.run.syncSaveState(json);
    console.log("Cloud Synced ☁️");
}



// รับข้อมูลจาก Cloud มาแสดง (Viewer Only)
function restoreState(json) {
    // ✨ FIX UI FREEZE: ถ้า Viewer กำลังกด Modal (เช่น ดูประวัติ หรือ setting) อย่าเพิ่ง Render ทับ
    if (isModalOpen()) return;


    if (!json) return;
    const state = JSON.parse(json);
   
    players = state.players;
   
    // ✨ Sync settings: อัปเดตจำนวนคอร์ทและกติกา
    if (state.courtCount) {
        courtCount = state.courtCount;
        // อัปเดตตัวเลขใน Input เผื่อไว้ (แม้จะซ่อนอยู่)
        const calcInput = document.getElementById('calc-court-count');
        if (calcInput) calcInput.value = courtCount;
    }
    if (state.gameRule) {
        const ruleSelect = document.getElementById('game-rule');
        if (ruleSelect) ruleSelect.value = state.gameRule;
    }
   
    // อัปเดตคอร์ท
    courts = state.courts.map(c => {
        c.interval = null;
        return c;
    });


    renderCourts();
    updateQueueDisplay();
    updateNextMatchPanel();
}


// Modal แจกวาป
function showShareLinkModal() {
    // สร้าง URL สำหรับคนดู (เอา URL ปัจจุบัน + ?mode=viewer)
    const baseUrl = (typeof APP_URL !== 'undefined' && APP_URL) ? APP_URL : window.location.href.split('?')[0];
    const viewerUrl = baseUrl + '?mode=viewer';
   
    const html = `
        <div style="text-align:center;">
            <h3>📡 ลิงก์สำหรับเพื่อน (View Only)</h3>
            <p>ส่งลิงก์นี้ลงไลน์กลุ่มได้เลย เพื่อนจะเห็นคอร์ทและคิว แต่กดแก้ไขไม่ได้</p>
            <input type="text" value="${viewerUrl}" id="share-link-input" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
            <button class="success" onclick="copyShareLink()">📋 Copy Link</button>
            <button class="secondary" onclick="closeModal('booking-modal')">ปิด</button>
        </div>
    `;
   
    document.getElementById('booking-inputs').innerHTML = html;

    document.querySelector('#booking-modal .modal-actions').style.display = 'none';
}


function copyShareLink() {
    const copyText = document.getElementById("share-link-input");
    copyText.select();
    document.execCommand("copy");
    alert("ก๊อปปี้แล้ว! เอาไปแปะในไลน์โลด");
}
